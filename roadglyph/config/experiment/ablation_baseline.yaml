# @package _global_
# Ablation: Baseline (vision -> waypoints only, no S/R/A, no FiLM)
defaults:
  - /data_module: td_no_buckets
  - /model/vision_model: llavanext

model:
  lr: 3e-5
  vision_lr: 3e-5
  hidden_dim: 512
  pool_type: mean
  decoder_type: mlp
  use_film: false
  predict_phase: false
  predict_route_as_wps: false
  speed_wps_mode: '2d'
  use_prev_action_id: false
  use_gt_conditioning: false
  vision_model:
    downsample_feature_grid_factor: 2

data_module:
  data_path: /path/to/dataset
  bucket_path: /path/to/dataset
  batch_size: 8
  num_workers: 4
  route_as: target_point
  hist_len: 1
  cut_bottom_quarter: false
  use_global_img: false
  img_shift_augmentation: true
  img_shift_augmentation_prob: 0.5
  image_enhancing: true
  use_prev_action_id: false

max_epochs: 3
seed: 42
gpus: 8
val_every_n_epochs: 1
debug: false
wandb_name: ablation_baseline
name: ablation_baseline
