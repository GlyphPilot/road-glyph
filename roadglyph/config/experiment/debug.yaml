# @package _global_
defaults:
  - /data_module: td_no_buckets
  - /model/vision_model: llavanext

model:
  lr: 3e-5
  vision_lr: 3e-5
  hidden_dim: 512
  pool_type: mean
  decoder_type: mlp
  predict_phase: false
  predict_route_as_wps: false
  speed_wps_mode: '2d'
  use_prev_action_id: false
  use_gt_conditioning: true
  gt_ctx_ratio: 0.3
  gt_lat_ratio: 0.2
  gt_lon_ratio: 0.3
  vision_model:
    downsample_feature_grid_factor: 2

data_module:
  data_path: database/simlingo
  batch_size: 4
  num_workers: 0
  route_as: target_point
  hist_len: 1
  cut_bottom_quarter: false
  use_global_img: false
  img_shift_augmentation: true
  img_shift_augmentation_prob: 0.5
  image_enhancing: true
  use_prev_action_id: false

max_epochs: 30
val_every_n_epochs: 2
debug: true
gpus: 1
wandb_name: debug
